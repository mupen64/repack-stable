name: Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      # Mupen64

      - name: Get latest mupen64-rr-lua run ID
        id: get-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/mupen64/mupen64-rr-lua/actions/artifacts?name=mupen-release-nightly&per_page=1" \
            --jq '.artifacts[0].workflow_run.id')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download mupen-release-nightly artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _nightlytmp
          gh run download ${{ steps.get-run.outputs.run_id }} \
            --repo mupen64/mupen64-rr-lua \
            --name "mupen-release-nightly" \
            --dir _nightlytmp
          mkdir -p nightly
          cp -rf _nightlytmp/. nightly/
          rm -rf _nightlytmp

      # SM64LuaRedux

      - name: Download SM64LuaRedux source
        run: |
          curl -fsSL \
            "https://github.com/mupen64/SM64LuaRedux/archive/refs/heads/main.zip" \
            -o sm64luaredux.zip

      - name: Unpack SM64LuaRedux
        run: |
          mkdir -p nightly/SM64LuaRedux
          unzip -o sm64luaredux.zip -d _sm64tmp
          # The zip extracts to SM64LuaRedux-main/; move its contents into place
          shopt -s dotglob
          mv _sm64tmp/SM64LuaRedux-main/* nightly/SM64LuaRedux/
          rm -rf _sm64tmp sm64luaredux.zip

      # ── Commit & push ─────────────────────────────────────────────────────

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nightly/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync nightly artifacts [skip ci]"
          git push

  sync-stable:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      # Mupen64

      - name: Get latest mupen64-rr-lua release
        id: get-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_URL=$(gh api \
            "repos/mupen64/mupen64-rr-lua/releases/latest" \
            --jq '.assets[] | select(.name | startswith("mupen64")) | .browser_download_url')
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"

      - name: Download and unpack mupen64 stable release
        run: |
          curl -fsSL "${{ steps.get-release.outputs.asset_url }}" -o mupen64-stable.zip
          mkdir -p _mupen64tmp
          unzip -o mupen64-stable.zip -d _mupen64tmp
          mkdir -p stable
          cp -rf _mupen64tmp/release-artifact/. stable/
          rm -rf _mupen64tmp mupen64-stable.zip

      # SM64LuaRedux

      - name: Get latest SM64LuaRedux release tag
        id: get-sm64-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api \
            "repos/mupen64/SM64LuaRedux/releases/latest" \
            --jq '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download and unpack SM64LuaRedux stable release
        run: |
          curl -fsSL \
            "https://github.com/mupen64/SM64LuaRedux/archive/refs/tags/${{ steps.get-sm64-tag.outputs.tag }}.zip" \
            -o sm64luaredux-stable.zip
          mkdir -p _sm64stabletmp
          unzip -o sm64luaredux-stable.zip -d _sm64stabletmp
          mkdir -p stable/SM64LuaRedux
          # The zip extracts to a single top-level folder; move its contents into place
          TOP=$(ls _sm64stabletmp/)
          cp -rf "_sm64stabletmp/$TOP/." stable/SM64LuaRedux/
          rm -rf _sm64stabletmp sm64luaredux-stable.zip

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync stable releases [skip ci]"
          git push

name: Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      # Mupen64

      - name: Get latest mupen64-rr-lua run ID
        id: get-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/mupen64/mupen64-rr-lua/actions/artifacts?name=mupen-release-beta&per_page=1" \
            --jq '.artifacts[0].workflow_run.id')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download mupen-release-beta artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p beta
          gh run download ${{ steps.get-run.outputs.run_id }} \
            --repo mupen64/mupen64-rr-lua \
            --name "mupen-release-beta" \
            --dir beta

      # SM64LuaRedux

      - name: Download SM64LuaRedux source
        run: |
          curl -fsSL \
            "https://github.com/mupen64/SM64LuaRedux/archive/refs/heads/main.zip" \
            -o sm64luaredux.zip

      - name: Unpack SM64LuaRedux
        run: |
          mkdir -p beta/SM64LuaRedux
          unzip -o sm64luaredux.zip -d _sm64tmp
          # The zip extracts to SM64LuaRedux-main/; move its contents into place
          shopt -s dotglob
          mv _sm64tmp/SM64LuaRedux-main/* beta/SM64LuaRedux/
          rm -rf _sm64tmp sm64luaredux.zip

      # ── Commit & push ─────────────────────────────────────────────────────

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add beta/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync beta artifacts [skip ci]"
          git push
